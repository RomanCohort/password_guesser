<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Guesser - AI 密码猜测系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                <h1>Password Guesser</h1>
            </div>
            <div class="status" id="status">
                <span class="status-dot"></span>
                <span class="status-text">检查中...</span>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main">
            <!-- Left Panel: Input -->
            <div class="panel input-panel">
                <!-- LLM Configuration -->
                <section class="section">
                    <h2>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="3"/>
                            <path d="M12 1v6m0 6v10M1 12h6m6 0h10"/>
                        </svg>
                        LLM 配置
                    </h2>
                    <div class="form-group">
                        <label for="apiKey">API Key</label>
                        <input type="password" id="apiKey" placeholder="sk-..." class="input">
                    </div>
                    <div class="form-group">
                        <label for="apiBase">API Base URL</label>
                        <input type="text" id="apiBase" value="https://api.deepseek.com/v1" class="input">
                    </div>
                    <button id="configureLLM" class="btn btn-secondary">
                        配置 LLM
                    </button>
                </section>

                <!-- Target Information -->
                <section class="section">
                    <h2>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        目标信息
                    </h2>
                    <div class="form-group">
                        <label for="targetInfo">输入目标个人信息</label>
                        <textarea id="targetInfo" class="textarea" rows="6"
                            placeholder="输入目标的个人信息，如姓名、生日、电话、兴趣爱好、宠物名字等..."></textarea>
                    </div>
                    <div class="checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="useLLM" checked>
                            <span>使用 LLM 提取</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="parallelExtract">
                            <span>并行提取</span>
                        </label>
                    </div>
                    <div class="form-group">
                        <label for="extractStages">提取阶段</label>
                        <select id="extractStages" class="select">
                            <option value="1">1 - 快速提取</option>
                            <option value="2">2 - 验证</option>
                            <option value="3" selected>3 - 深度挖掘</option>
                        </select>
                    </div>
                </section>

                <!-- Generation Configuration -->
                <section class="section">
                    <h2>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                        </svg>
                        生成配置
                    </h2>
                    <div class="form-group">
                        <label for="genMethod">生成方法</label>
                        <select id="genMethod" class="select">
                            <option value="sampling">采样 (Sampling)</option>
                            <option value="beam">Beam Search</option>
                            <option value="diverse_beam">Diverse Beam</option>
                            <option value="typical">Typical Sampling</option>
                            <option value="contrastive">Contrastive Search</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="nSamples">生成数量</label>
                            <input type="number" id="nSamples" value="20" min="1" max="100" class="input">
                        </div>
                        <div class="form-group">
                            <label for="temperature">温度</label>
                            <input type="number" id="temperature" value="1.0" min="0.1" max="2.0" step="0.1" class="input">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="topK">Top-K</label>
                            <input type="number" id="topK" value="0" min="0" max="100" class="input">
                        </div>
                        <div class="form-group">
                            <label for="topP">Top-P</label>
                            <input type="number" id="topP" value="0.9" min="0" max="1" step="0.05" class="input">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="tempSchedule">温度调度</label>
                        <select id="tempSchedule" class="select">
                            <option value="constant">固定</option>
                            <option value="linear_decay">线性衰减</option>
                            <option value="linear_increase">线性增加</option>
                            <option value="cosine">余弦</option>
                        </select>
                    </div>
                </section>

                <!-- Generate Button -->
                <button id="generateBtn" class="btn btn-primary btn-large">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="5 3 19 12 5 21 5 3"/>
                    </svg>
                    生成密码
                </button>
            </div>

            <!-- Right Panel: Output -->
            <div class="panel output-panel">
                <!-- Extracted Features -->
                <section class="section">
                    <h2>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <polyline points="14 2 14 8 20 8"/>
                            <line x1="16" y1="13" x2="8" y2="13"/>
                            <line x1="16" y1="17" x2="8" y2="17"/>
                        </svg>
                        提取的特征
                    </h2>
                    <div id="extractedFeatures" class="features-grid">
                        <p class="placeholder">配置 LLM 并输入目标信息后，点击"生成密码"开始提取</p>
                    </div>
                </section>

                <!-- Generated Passwords -->
                <section class="section">
                    <h2>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
                        </svg>
                        生成的密码
                        <span id="passwordCount" class="badge"></span>
                    </h2>
                    <div id="passwordResults" class="password-grid">
                        <p class="placeholder">点击"生成密码"开始生成</p>
                    </div>
                </section>

                <!-- Statistics -->
                <section class="section stats-section">
                    <h2>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="20" x2="18" y2="10"/>
                            <line x1="12" y1="20" x2="12" y2="4"/>
                            <line x1="6" y1="20" x2="6" y2="14"/>
                        </svg>
                        统计信息
                    </h2>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <span class="stat-label">提取时间</span>
                            <span id="extractTime" class="stat-value">-</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-label">生成时间</span>
                            <span id="genTime" class="stat-value">-</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-label">缓存命中率</span>
                            <span id="cacheHitRate" class="stat-value">-</span>
                        </div>
                    </div>
                </section>
            </div>
        </main>

        <!-- Loading Overlay -->
        <div id="loadingOverlay" class="loading-overlay hidden">
            <div class="loading-spinner">
                <div class="spinner"></div>
                <p id="loadingText">处理中...</p>
            </div>
        </div>

        <!-- Toast Notifications -->
        <div id="toastContainer" class="toast-container"></div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
